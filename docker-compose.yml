services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_dbs:/app/chroma_dbs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  chroma_dbs:
  hf_cache:
